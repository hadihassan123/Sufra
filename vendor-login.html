<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vendor login — Sufra</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="wrap">
    <a href="index.html" class="brand">Sufra <small>The Spread</small></a>
    <nav class="nav-links">
      <a href="index.html">Browse</a>
      <a href="vendor-signup.html" class="nav-cta">List your surplus</a>
    </nav>
  </div>
</header>

<div class="auth-shell">
  <div class="auth-card">
    <p class="eyebrow">Vendor access</p>
    <h1>Log in</h1>
    <p class="sub">Manage your listings, stock, and pickup codes.</p>

    <div class="form-msg error" id="formMsg"></div>

    <form id="loginForm">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="you@business.qa">
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" required placeholder="Your password">
      </div>
      <button type="submit" class="btn btn-teal btn-block">Log in</button>
    </form>
    <p class="auth-switch">New here? <a href="vendor-signup.html">Create a vendor account</a></p>
    <p class="hint" style="margin-top:18px; text-align:center;">Demo accounts: demo@zubara.qa / demo@corniche.qa / demo@souqgrill.qa — password <strong>demo1234</strong></p>
  </div>
</div>

<script src="js/store.js"></script>
<script>
  const form = document.getElementById('loginForm');
  const msg = document.getElementById('formMsg');

  form.addEventListener('submit', (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    const vendor = Store.findVendorByEmail(email);
    if(!vendor || vendor.password !== password){
      msg.textContent = 'Incorrect email or password.';
      msg.className = 'form-msg error show';
      return;
    }
    Store.setSession(vendor.id);
    window.location.href = 'vendor-dashboard.html';
  });
</script>
</body>
</html>
