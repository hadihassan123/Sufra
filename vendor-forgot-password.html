<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reset your password — Sufra</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="wrap">
    <a href="index.html" class="brand">Sufra <small>The Spread</small></a>
    <nav class="nav-links">
      <a href="vendor-login.html">Vendor login</a>
    </nav>
  </div>
</header>

<div class="auth-shell">
  <div class="auth-card">
    <p class="eyebrow">Vendor access</p>
    <h1>Reset your password</h1>
    <p class="sub">Enter the email on your vendor account and we'll send a link to set a new password.</p>

    <div class="form-msg" id="formMsg"></div>

    <form id="resetForm">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" required placeholder="you@business.qa">
      </div>
      <button type="submit" class="btn btn-teal btn-block" id="submitBtn">Send reset link</button>
    </form>
    <p class="auth-switch">Remembered it? <a href="vendor-login.html">Back to login</a></p>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="js/supabase-client.js"></script>
<script src="js/store.js"></script>
<script>
  const form = document.getElementById('resetForm');
  const msg = document.getElementById('formMsg');
  const submitBtn = document.getElementById('submitBtn');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    submitBtn.disabled = true;
    const email = document.getElementById('email').value.trim();

    try{
      await Store.requestPasswordReset(email);
      // Deliberately the same message whether or not the email exists —
      // confirming/denying an account's existence here is an information leak.
      msg.textContent = 'If an account exists for that email, a reset link is on its way. Check your inbox (and spam folder).';
      msg.className = 'form-msg success show';
      submitBtn.textContent = 'Link sent';
    }catch(err){
      msg.textContent = err.message || 'Something went wrong. Please try again.';
      msg.className = 'form-msg error show';
      submitBtn.disabled = false;
    }
  });
</script>
</body>
</html>
